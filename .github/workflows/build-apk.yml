name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: swiftpos

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: swiftpos/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Add Android Platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Icons
        run: |
          if npm list @capacitor/assets >/dev/null 2>&1; then
            npx capacitor-assets generate --android
          fi
        continue-on-error: true

      - name: Make gradlew Executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: swiftpos/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftPOS-Debug-APK
          path: swiftpos/android/app/build/outputs/apk/debug/app-debug.apk
