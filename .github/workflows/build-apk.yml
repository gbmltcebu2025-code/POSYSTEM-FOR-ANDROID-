name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: swiftpos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: swiftpos/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate Android assets
        run: npx capacitor-assets generate --android || true

      - name: Patch AndroidManifest
        run: |
          python3 - << 'PYEOF'
          import re

          path="android/app/src/main/AndroidManifest.xml"

          with open(path,"r") as f:
              content=f.read()

          permissions=[
          '<uses-permission android:name="android.permission.CAMERA" />',
          '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
          '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
          '<uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />',
          '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />',
          '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />',
          '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />',
          '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />'
          ]

          for perm in permissions:
              name=re.search(r'android:name="([^"]+)"',perm).group(1)
              if name not in content:
                  content=re.sub(r'(<manifest[^>]*>)',r'\1\n    '+perm,content,1)

          if "com.google.mlkit.vision.DEPENDENCIES" not in content:
              content=re.sub(
                  r'(<application[^>]*>)',
                  r'\1\n        <meta-data android:name="com.google.mlkit.vision.DEPENDENCIES" android:value="barcode_ui" />',
                  content,
                  1
              )

          with open(path,"w") as f:
              f.write(content)
          PYEOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
          cache-dependency-path: swiftpos/android/**/*.gradle*

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: swiftpos/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftPOS-debug-apk
          path: swiftpos/android/app/build/outputs/apk/debug/app-debug.apk
